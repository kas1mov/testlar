      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;

    h1 {
      color: #e91e63;
    }
    .date {
      font-size: 20px;
      font-weight: bold;
      margin: 15px 0;
    }
    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #e91e63;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎉 Taklifnoma</h1>
    <p>Aziz do‘stim!</p>

</html>
